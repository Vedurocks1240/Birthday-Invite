<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sparsh's 6th Birthday Invite</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: #0d0d0d;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .card {
            background: #141414;
            border-radius: 32px;
            padding: 48px 36px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            position: relative;
            box-shadow: 0 0 60px rgba(0, 200, 255, 0.08);
            border: 1px solid rgba(255,255,255,0.04);
        }

        .card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 34px;
            background: linear-gradient(135deg, #00c8ff, #ff6b6b, #ffd93d, #6bcb77);
            z-index: -1;
            opacity: 0.25;
        }

        .photo-frame {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 4px solid rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #1a1a1a;
            overflow: hidden;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .name {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #ffd93d;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .age {
            font-size: 1.1rem;
            color: #00c8ff;
            font-weight: 400;
            margin-bottom: 32px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #00c8ff);
            border-radius: 2px;
            margin: 0 auto 32px;
        }

        .details {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 36px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: rgba(255,255,255,0.7);
            font-size: 1.05rem;
            font-weight: 300;
        }

        .detail-item .icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .icon-date { background: rgba(255, 107, 107, 0.15); color: #ff6b6b; }
        .icon-time { background: rgba(0, 200, 255, 0.15); color: #00c8ff; }
        .icon-location { background: rgba(107, 203, 119, 0.15); color: #6bcb77; }

        .venue-link {
            color: #6bcb77;
            text-decoration: none;
            font-weight: 400;
            transition: color 0.2s;
        }
        .venue-link:hover {
            color: #ffd93d;
            text-decoration: underline;
        }

        /* Background Roblox Images */
        .blocks {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: -3;
            overflow: hidden;
        }

        .block {
            position: absolute;
            border-radius: 12px;
            opacity: 0.08;
            object-fit: cover;
        }

        .b1 { width: 90px; height: 90px; top: 8%; left: 5%; transform: rotate(12deg); }
        .b2 { width: 70px; height: 70px; top: 22%; right: 8%; transform: rotate(-8deg); }
        .b3 { width: 100px; height: 100px; bottom: 18%; left: 10%; transform: rotate(20deg); }
        .b4 { width: 80px; height: 80px; bottom: 32%; right: 5%; transform: rotate(-15deg); }
        .b5 { width: 65px; height: 65px; top: 55%; left: 3%; transform: rotate(5deg); }
        .b6 { width: 85px; height: 85px; top: 6%; right: 22%; transform: rotate(-22deg); }
        .b7 { width: 75px; height: 75px; bottom: 8%; right: 18%; transform: rotate(18deg); }

        /* Confetti */
        .confetti {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: -2;
            overflow: hidden;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            opacity: 0.6;
            animation: confettiFall 5s linear infinite;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.6; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        .c1 { background: #ff6b6b; left: 10%; animation-delay: 0s; animation-duration: 4.5s; }
        .c2 { background: #ffd93d; left: 20%; animation-delay: 0.5s; animation-duration: 5.2s; width: 8px; height: 8px; }
        .c3 { background: #00c8ff; left: 30%; animation-delay: 1.2s; animation-duration: 4.8s; }
        .c4 { background: #6bcb77; left: 40%; animation-delay: 0.3s; animation-duration: 5.5s; width: 12px; height: 6px; border-radius: 0; }
        .c5 { background: #ff6b6b; left: 50%; animation-delay: 1.8s; animation-duration: 4.2s; }
        .c6 { background: #ffd93d; left: 60%; animation-delay: 0.8s; animation-duration: 5s; width: 6px; height: 12px; border-radius: 0; }
        .c7 { background: #00c8ff; left: 70%; animation-delay: 2.1s; animation-duration: 4.6s; }
        .c8 { background: #6bcb77; left: 80%; animation-delay: 0.2s; animation-duration: 5.3s; }
        .c9 { background: #ff6b6b; left: 90%; animation-delay: 1.5s; animation-duration: 4.9s; width: 8px; height: 8px; }
        .c10 { background: #ffd93d; left: 15%; animation-delay: 2.8s; animation-duration: 5.1s; }
        .c11 { background: #00c8ff; left: 25%; animation-delay: 3.2s; animation-duration: 4.4s; width: 12px; height: 6px; border-radius: 0; }
        .c12 { background: #6bcb77; left: 35%; animation-delay: 1.0s; animation-duration: 5.6s; }
        .c13 { background: #ff6b6b; left: 45%; animation-delay: 2.5s; animation-duration: 4.7s; width: 6px; height: 12px; border-radius: 0; }
        .c14 { background: #ffd93d; left: 55%; animation-delay: 3.5s; animation-duration: 5.4s; }
        .c15 { background: #00c8ff; left: 65%; animation-delay: 0.7s; animation-duration: 4.3s; width: 8px; height: 8px; }
        .c16 { background: #6bcb77; left: 75%; animation-delay: 2.2s; animation-duration: 5s; }
        .c17 { background: #ff6b6b; left: 85%; animation-delay: 1.3s; animation-duration: 4.8s; width: 12px; height: 6px; border-radius: 0; }
        .c18 { background: #ffd93d; left: 5%; animation-delay: 3.8s; animation-duration: 5.2s; }
        .c19 { background: #00c8ff; left: 95%; animation-delay: 0.4s; animation-duration: 4.6s; width: 6px; height: 12px; border-radius: 0; }
        .c20 { background: #6bcb77; left: 50%; animation-delay: 4.2s; animation-duration: 5.5s; }

        /* Fireworks */
        .fireworks {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .firework {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
        }

        .firework::before, .firework::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        @keyframes fireworkBurst {
            0% { transform: scale(0); opacity: 1; }
            50% { opacity: 0.8; }
            100% { transform: scale(25); opacity: 0; }
        }

        @keyframes fireworkParticle {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { opacity: 0; }
        }

        .fw-burst {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: fireworkBurst 2s ease-out infinite;
        }

        .fw-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            animation: fireworkParticle 2s ease-out infinite;
        }

        /* Firework 1 - Top Left */
        .fw1 { top: 15%; left: 15%; }
        .fw1 .fw-burst { background: #ff6b6b; animation-delay: 0s; }
        .fw1 .fw-particle:nth-child(1) { background: #ff6b6b; animation-delay: 0s; --tx: -40px; --ty: -30px; }
        .fw1 .fw-particle:nth-child(2) { background: #ffd93d; animation-delay: 0s; --tx: 40px; --ty: -30px; }
        .fw1 .fw-particle:nth-child(3) { background: #00c8ff; animation-delay: 0s; --tx: 0px; --ty: -50px; }
        .fw1 .fw-particle:nth-child(4) { background: #6bcb77; animation-delay: 0s; --tx: -30px; --ty: 20px; }
        .fw1 .fw-particle:nth-child(5) { background: #ff6b6b; animation-delay: 0s; --tx: 30px; --ty: 20px; }
        .fw1 .fw-particle:nth-child(6) { background: #ffd93d; animation-delay: 0s; --tx: -50px; --ty: 0px; }
        .fw1 .fw-particle:nth-child(7) { background: #00c8ff; animation-delay: 0s; --tx: 50px; --ty: 0px; }
        .fw1 .fw-particle:nth-child(8) { background: #6bcb77; animation-delay: 0s; --tx: 0px; --ty: 40px; }

        /* Firework 2 - Top Right */
        .fw2 { top: 10%; right: 20%; }
        .fw2 .fw-burst { background: #00c8ff; animation-delay: 1s; }
        .fw2 .fw-particle:nth-child(1) { background: #00c8ff; animation-delay: 1s; --tx: -35px; --ty: -25px; }
        .fw2 .fw-particle:nth-child(2) { background: #ffd93d; animation-delay: 1s; --tx: 35px; --ty: -25px; }
        .fw2 .fw-particle:nth-child(3) { background: #ff6b6b; animation-delay: 1s; --tx: 0px; --ty: -45px; }
        .fw2 .fw-particle:nth-child(4) { background: #6bcb77; animation-delay: 1s; --tx: -25px; --ty: 25px; }
        .fw2 .fw-particle:nth-child(5) { background: #00c8ff; animation-delay: 1s; --tx: 25px; --ty: 25px; }
        .fw2 .fw-particle:nth-child(6) { background: #ffd93d; animation-delay: 1s; --tx: -45px; --ty: 0px; }
        .fw2 .fw-particle:nth-child(7) { background: #ff6b6b; animation-delay: 1s; --tx: 45px; --ty: 0px; }
        .fw2 .fw-particle:nth-child(8) { background: #6bcb77; animation-delay: 1s; --tx: 0px; --ty: 35px; }

        /* Firework 3 - Bottom Left */
        .fw3 { bottom: 20%; left: 20%; }
        .fw3 .fw-burst { background: #ffd93d; animation-delay: 2s; }
        .fw3 .fw-particle:nth-child(1) { background: #ffd93d; animation-delay: 2s; --tx: -45px; --ty: -35px; }
        .fw3 .fw-particle:nth-child(2) { background: #ff6b6b; animation-delay: 2s; --tx: 45px; --ty: -35px; }
        .fw3 .fw-particle:nth-child(3) { background: #6bcb77; animation-delay: 2s; --tx: 0px; --ty: -55px; }
        .fw3 .fw-particle:nth-child(4) { background: #00c8ff; animation-delay: 2s; --tx: -35px; --ty: 25px; }
        .fw3 .fw-particle:nth-child(5) { background: #ffd93d; animation-delay: 2s; --tx: 35px; --ty: 25px; }
        .fw3 .fw-particle:nth-child(6) { background: #ff6b6b; animation-delay: 2s; --tx: -55px; --ty: 0px; }
        .fw3 .fw-particle:nth-child(7) { background: #6bcb77; animation-delay: 2s; --tx: 55px; --ty: 0px; }
        .fw3 .fw-particle:nth-child(8) { background: #00c8ff; animation-delay: 2s; --tx: 0px; --ty: 45px; }

        /* Firework 4 - Bottom Right */
        .fw4 { bottom: 25%; right: 15%; }
        .fw4 .fw-burst { background: #6bcb77; animation-delay: 0.5s; }
        .fw4 .fw-particle:nth-child(1) { background: #6bcb77; animation-delay: 0.5s; --tx: -30px; --ty: -20px; }
        .fw4 .fw-particle:nth-child(2) { background: #00c8ff; animation-delay: 0.5s; --tx: 30px; --ty: -20px; }
        .fw4 .fw-particle:nth-child(3) { background: #ffd93d; animation-delay: 0.5s; --tx: 0px; --ty: -40px; }
        .fw4 .fw-particle:nth-child(4) { background: #ff6b6b; animation-delay: 0.5s; --tx: -20px; --ty: 30px; }
        .fw4 .fw-particle:nth-child(5) { background: #6bcb77; animation-delay: 0.5s; --tx: 20px; --ty: 30px; }
        .fw4 .fw-particle:nth-child(6) { background: #00c8ff; animation-delay: 0.5s; --tx: -40px; --ty: 0px; }
        .fw4 .fw-particle:nth-child(7) { background: #ffd93d; animation-delay: 0.5s; --tx: 40px; --ty: 0px; }
        .fw4 .fw-particle:nth-child(8) { background: #ff6b6b; animation-delay: 0.5s; --tx: 0px; --ty: 35px; }

        /* Firework 5 - Center Top */
        .fw5 { top: 5%; left: 50%; }
        .fw5 .fw-burst { background: #ff6b6b; animation-delay: 1.5s; }
        .fw5 .fw-particle:nth-child(1) { background: #ff6b6b; animation-delay: 1.5s; --tx: -38px; --ty: -28px; }
        .fw5 .fw-particle:nth-child(2) { background: #ffd93d; animation-delay: 1.5s; --tx: 38px; --ty: -28px; }
        .fw5 .fw-particle:nth-child(3) { background: #00c8ff; animation-delay: 1.5s; --tx: 0px; --ty: -48px; }
        .fw5 .fw-particle:nth-child(4) { background: #6bcb77; animation-delay: 1.5s; --tx: -28px; --ty: 22px; }
        .fw5 .fw-particle:nth-child(5) { background: #ff6b6b; animation-delay: 1.5s; --tx: 28px; --ty: 22px; }
        .fw5 .fw-particle:nth-child(6) { background: #ffd93d; animation-delay: 1.5s; --tx: -48px; --ty: 0px; }
        .fw5 .fw-particle:nth-child(7) { background: #00c8ff; animation-delay: 1.5s; --tx: 48px; --ty: 0px; }
        .fw5 .fw-particle:nth-child(8) { background: #6bcb77; animation-delay: 1.5s; --tx: 0px; --ty: 38px; }

        .fw-particle {
            animation-name: fireworkParticle;
        }

        @keyframes fireworkParticle {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        @media (max-width: 480px) {
            .card { padding: 36px 24px; }
            .name { font-size: 1.4rem; }
            h1 { font-size: 1.2rem; }
            .b1 { width: 60px; height: 60px; }
            .b2 { width: 50px; height: 50px; }
            .b3 { width: 70px; height: 70px; }
            .b4 { width: 55px; height: 55px; }
            .b5 { width: 45px; height: 45px; }
            .b6 { width: 60px; height: 60px; }
            .b7 { width: 55px; height: 55px; }
        }
    </style>
<base target="_blank">
